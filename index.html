<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cocokkan Warna</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#111;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    width:100%;
    max-width:430px;
    padding:20px;
    text-align:center;
}

/* HALAMAN START */

#startScreen{
    display:block;
}

#gameScreen{
    display:none;
}

h1{
    font-size:38px;
    margin-bottom:15px;
}

p{
    margin-bottom:20px;
    color:#ccc;
}

.startBtn{
    padding:15px 35px;
    font-size:20px;
    border:none;
    border-radius:15px;
    background:white;
    color:black;
    font-weight:bold;
}

/* GAME */

.colorTarget{
    width:100%;
    height:180px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 0 20px rgba(255,255,255,0.2);
}

.colorPlayer{
    width:100%;
    height:180px;
    border-radius:20px;
    margin-top:20px;
    margin-bottom:20px;
    border:3px solid white;
}

.sliderBox{
    text-align:left;
    margin-bottom:15px;
}

label{
    font-size:18px;
}

input[type=range]{
    width:100%;
}

.result{
    margin-top:20px;
    font-size:24px;
    font-weight:bold;
}

.score{
    margin-top:10px;
    font-size:20px;
    color:#00ff99;
}

.checkBtn{
    padding:15px 25px;
    border:none;
    border-radius:15px;
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

</style>
</head>
<body>

<div class="container">

    <!-- START SCREEN -->
    <div id="startScreen">

        <h1>Cocokkan Warna</h1>

        <p>
            Cocokkan warna bawah dengan warna target di atas.
            Semakin mirip semakin tinggi akurasinya!
        </p>

        <button class="startBtn" onclick="startGame()">
            START
        </button>

    </div>

    <!-- GAME SCREEN -->
    <div id="gameScreen">

        <h2>Warna Target</h2>

        <div id="targetColor" class="colorTarget"></div>

        <h2>Warna Kamu</h2>

        <div id="playerColor" class="colorPlayer"></div>

        <!-- RGB -->
        <div class="sliderBox">
            <label>Red</label>
            <input type="range" min="0" max="255" value="128" id="red">
        </div>

        <div class="sliderBox">
            <label>Green</label>
            <input type="range" min="0" max="255" value="128" id="green">
        </div>

        <div class="sliderBox">
            <label>Blue</label>
            <input type="range" min="0" max="255" value="128" id="blue">
        </div>

        <button class="checkBtn" onclick="checkAccuracy()">
            CEK AKURASI
        </button>

        <div class="result" id="result"></div>

        <div class="score" id="score"></div>

    </div>

</div>

<script>

let targetR, targetG, targetB;

const red = document.getElementById("red");
const green = document.getElementById("green");
const blue = document.getElementById("blue");

const playerColor = document.getElementById("playerColor");

function startGame(){

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("gameScreen").style.display = "block";

    randomColor();
    updatePlayerColor();
}

function randomColor(){

    targetR = Math.floor(Math.random()*256);
    targetG = Math.floor(Math.random()*256);
    targetB = Math.floor(Math.random()*256);

    document.getElementById("targetColor").style.background =
    `rgb(${targetR}, ${targetG}, ${targetB})`;
}

function updatePlayerColor(){

    const r = red.value;
    const g = green.value;
    const b = blue.value;

    playerColor.style.background =
    `rgb(${r}, ${g}, ${b})`;
}

red.addEventListener("input", updatePlayerColor);
green.addEventListener("input", updatePlayerColor);
blue.addEventListener("input", updatePlayerColor);

function checkAccuracy(){

    const r = parseInt(red.value);
    const g = parseInt(green.value);
    const b = parseInt(blue.value);

    const diff =
    Math.abs(r-targetR) +
    Math.abs(g-targetG) +
    Math.abs(b-targetB);

    let accuracy =
    100 - Math.floor((diff / 765) * 100);

    if(accuracy < 0){
        accuracy = 0;
    }

    document.getElementById("result").innerHTML =
    accuracy + "% MIRIP";

    if(accuracy >= 90){
        document.getElementById("score").innerHTML =
        "PERFECT!";
    }
    else if(accuracy >= 70){
        document.getElementById("score").innerHTML =
        "Bagus!";
    }
    else if(accuracy >= 50){
        document.getElementById("score").innerHTML =
        "Lumayan!";
    }
    else{
        document.getElementById("score").innerHTML =
        "Coba lagi!";
    }

    setTimeout(() => {

        randomColor();

        document.getElementById("result").innerHTML = "";
        document.getElementById("score").innerHTML = "";

    }, 2500);
}

</script>

</body>
</html>
